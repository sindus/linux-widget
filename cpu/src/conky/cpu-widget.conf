-- Widget processeur pour Conky — genere par Claude Code
-- Ancre sur le bureau (X11 / GNOME). Lecture native du CPU, aucun script externe.
conky.config = {
    -- Fenetre ancree "comme le fond d'ecran"
    own_window = true,
    own_window_type = 'normal',   -- si souci d'affichage, essayer 'desktop' ou 'override'
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 150,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'ConkyCpu',
    own_window_title = 'cpu-widget',

    background = true,
    double_buffer = true,
    update_interval = 2,          -- CPU : rafraichissement rapide mais leger
    total_run_times = 0,
    no_buffers = true,

    -- Position (milieu-droit, pour ne pas chevaucher le widget disque en haut-droit)
    alignment = 'middle_right',
    gap_x = 28,
    gap_y = 0,
    minimum_width = 290,
    maximum_width = 310,
    border_inner_margin = 12,
    border_outer_margin = 0,

    use_xft = true,
    font = 'DejaVu Sans Mono:size=9',
    override_utf8_locale = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    use_spacer = 'none',

    cpu_avg_samples = 2,
    top_name_width = 12,

    default_color = 'E8EAED',
    color1 = '8AB4F8',   -- titres (bleu)
    color2 = '9AA0A6',   -- libelles (gris)
    color3 = 'F28B82',
    color4 = '81C995',
};

conky.text = [[
${color1}${font DejaVu Sans:bold:size=12}PROCESSEUR${font}${color}
${voffset 2}${color2}Charge globale${color}${alignr}${cpu cpu0} %
${cpubar cpu0 10}
${voffset 2}${color2}Moyenne (1m)${color} ${loadavg 1}${alignr}${color2}Freq${color} ${freq_g} GHz
${color2}Uptime${color}${alignr}${uptime_short}
${voffset 6}${color1}Top processus (CPU)${color}
${voffset 2}${color}${top name 1}${alignr}${top cpu 1} %
${color}${top name 2}${alignr}${top cpu 2} %
${color}${top name 3}${alignr}${top cpu 3} %
${color}${top name 4}${alignr}${top cpu 4} %
${color}${top name 5}${alignr}${top cpu 5} %
]];
