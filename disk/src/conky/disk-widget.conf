-- Widget disque pour Conky — genere par Claude Code
-- Ancre sur le bureau (X11 / GNOME). Ultra leger : il ne fait que lire des
-- petits fichiers deja calcules par le service "disk-widget" + un df natif.
conky.config = {
    -- Fenetre ancree "comme le fond d'ecran"
    own_window = true,
    own_window_type = 'normal',   -- si souci d'affichage, essayer 'desktop' ou 'override'
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 150,  -- 0 = transparent total, 255 = opaque
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'ConkyDisk',
    own_window_title = 'disk-widget',

    background = true,
    double_buffer = true,
    update_interval = 60,         -- redessine + relit le df chaque minute (tres leger)
    total_run_times = 0,
    no_buffers = true,

    -- Position / taille
    alignment = 'top_right',
    gap_x = 28,
    gap_y = 48,
    minimum_width = 290,
    maximum_width = 310,
    border_inner_margin = 12,
    border_outer_margin = 0,

    -- Texte
    use_xft = true,
    font = 'DejaVu Sans Mono:size=9',
    override_utf8_locale = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    use_spacer = 'none',

    default_color = 'E8EAED',
    color1 = '8AB4F8',   -- titres (bleu)
    color2 = '9AA0A6',   -- libelles (gris)
    color3 = 'F28B82',   -- croissance (rouge doux)
    color4 = '81C995',   -- ok (vert)
};

conky.text = [[
${color1}${font DejaVu Sans:bold:size=12}DISQUE  /${font}${color}
${voffset 2}${color2}Occupation${color}${alignr}${fs_used_perc /} %
${fs_bar 10 /}
${voffset 2}${color2}Utilise${color} ${fs_used /}${alignr}${color2}Libre${color} ${fs_free /}
${color2}Total${color}${alignr}${fs_size /}
${voffset 6}${color1}Historique (occupation %)${color}
${voffset 2}${font DejaVu Sans Mono:size=11}${execi 120 cat /var/lib/disk-widget/spark.txt 2>/dev/null}${font}
${color2}${execi 120 cat /var/lib/disk-widget/delta.txt 2>/dev/null}${color}
${voffset 6}${color1}Top consommateurs${color}
${voffset 2}${execi 120 cat /var/lib/disk-widget/top.txt 2>/dev/null}
${voffset 6}${color3}A grossi (24 h)${color}
${voffset 2}${color3}${execi 120 cat /var/lib/disk-widget/growth.txt 2>/dev/null}${color}
${voffset 8}${color2}${font DejaVu Sans Mono:size=8}MAJ scan : ${execi 120 cat /var/lib/disk-widget/scantime.txt 2>/dev/null}${font}${color}
]];
