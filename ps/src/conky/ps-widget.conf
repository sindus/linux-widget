-- Widget memoire pour Conky — genere par Claude Code
-- Ancre sur le bureau (X11 / GNOME). Lecture native de la RAM/swap, aucun script externe.
conky.config = {
    -- Fenetre ancree "comme le fond d'ecran"
    own_window = true,
    own_window_type = 'normal',   -- si souci d'affichage, essayer 'desktop' ou 'override'
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 150,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'ConkyMem',
    own_window_title = 'ps-widget',

    background = true,
    double_buffer = true,
    update_interval = 3,          -- memoire : rafraichissement leger
    total_run_times = 0,
    no_buffers = true,

    -- Position (bas-droit, pour ne pas chevaucher disk/cpu)
    alignment = 'bottom_right',
    gap_x = 28,
    gap_y = 48,
    minimum_width = 290,
    maximum_width = 310,
    border_inner_margin = 12,
    border_outer_margin = 0,

    use_xft = true,
    font = 'DejaVu Sans Mono:size=9',
    override_utf8_locale = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    use_spacer = 'none',

    top_name_width = 12,

    default_color = 'E8EAED',
    color1 = '8AB4F8',   -- titres (bleu)
    color2 = '9AA0A6',   -- libelles (gris)
    color3 = 'F28B82',
    color4 = '81C995',
};

conky.text = [[
${color1}${font DejaVu Sans:bold:size=12}MEMOIRE${font}${color}
${voffset 2}${color2}RAM${color}${alignr}${memperc} %
${membar 10}
${voffset 2}${color2}Utilisee${color} ${mem}${alignr}${color2}Total${color} ${memmax}
${voffset 4}${color2}Swap${color}${alignr}${swapperc} %
${swapbar 10}
${voffset 2}${color2}Utilisee${color} ${swap}${alignr}${color2}Total${color} ${swapmax}
${voffset 6}${color1}Top processus (RAM)${color}
${voffset 2}${color}${top_mem name 1}${alignr}${top_mem mem_res 1}
${color}${top_mem name 2}${alignr}${top_mem mem_res 2}
${color}${top_mem name 3}${alignr}${top_mem mem_res 3}
${color}${top_mem name 4}${alignr}${top_mem mem_res 4}
${color}${top_mem name 5}${alignr}${top_mem mem_res 5}
]];
